name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: 3.11
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:static
      - run: test -s public/data/wines.json
      - run: docker build --platform linux/amd64 -t thai-wine-value-finder:ci .
